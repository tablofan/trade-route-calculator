<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Route Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1c1917;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      max-width: 1400px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #f5f0e8;
      font-size: 1.6rem;
      margin-bottom: 24px;
    }

    .section {
      background: #292524;
      border: 1px solid #44403c;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #d6d3d1;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 4px;
      padding: 10px;
      color: #e0e0e0;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.85rem;
      resize: vertical;
    }

    textarea:focus { outline: none; border-color: #b8a078; }
    textarea::placeholder { color: #555; }

    .btn {
      display: inline-block;
      background: #b8a078;
      color: #1c1917;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover { background: #c9b896; }
    .btn-secondary { background: #44403c; color: #ccc; }
    .btn-secondary:hover { background: #57534e; }

    .controls-row {
      display: flex;
      gap: 16px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .dropdown-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dropdown-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #a8a29e;
    }

    .dropdown-group select, .dropdown-group input {
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 4px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .dropdown-group select:focus, .dropdown-group input:focus {
      outline: none;
      border-color: #b8a078;
    }

    .label-lumber { color: #a67c52; }
    .label-clay { color: #c4703f; }
    .label-iron { color: #9a9ab0; }
    .label-crop { color: #b8a078; }

    .village-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .village-table th {
      text-align: left;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a8a29e;
      font-weight: 600;
      padding: 4px 5px;
      border-bottom: 2px solid #44403c;
      white-space: nowrap;
    }

    .village-table th.num { text-align: right; }

    .village-table th.group-header {
      text-align: center;
      color: #b8a078;
      border-bottom: 1px solid #44403c;
      font-size: 0.72rem;
      padding: 3px 5px;
    }

    .village-table td {
      padding: 4px 5px;
      border-bottom: 1px solid #44403c;
      vertical-align: middle;
    }

    .village-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .village-table td.village-name {
      font-weight: 600;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .village-table .spacer {
      width: 20px;
      padding: 0;
      border-bottom-color: transparent;
    }

    .village-table .group-divider {
      border-left: 1px solid #57534e;
    }

    #troops-table th:not(:first-child),
    #troops-table td:not(.village-name),
    #overview-table th:not(:first-child):not(:nth-child(2)),
    #overview-table td:not(:first-child):not(.village-name) {
      text-align: center;
    }

    .village-table tr:hover { background: #352f2b; }

    .village-table tr.set-all-row th {
      border-bottom: 2px solid #44403c;
      font-size: 0.65rem;
      color: #78716c;
      font-style: italic;
      padding-bottom: 6px;
    }

    .village-table tr.sum-row {
      font-weight: 700;
      border-top: 2px solid #b8a078;
    }

    .village-table tr.sum-row td {
      border-bottom: none;
      padding-top: 10px;
    }

    .village-table select {
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 3px;
      padding: 2px 4px;
      color: #e0e0e0;
      font-size: 0.75rem;
      cursor: pointer;
      max-width: 110px;
    }

    .village-table select:focus { outline: none; border-color: #b8a078; }

    .val-positive { color: #5cb85c; }
    .val-negative { color: #d9534f; }
    .val-zero { color: #666; }

    .note {
      font-size: 0.75rem;
      color: #78716c;
      margin-top: 10px;
    }

    .parse-error {
      color: #d9534f;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 0;
    }

    .tab-btn {
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #44403c;
      border-bottom: none;
      background: #1c1917;
      color: #a8a29e;
      border-radius: 6px 6px 0 0;
      margin-right: 2px;
    }

    .tab-btn.active {
      background: #292524;
      color: #b8a078;
      border-color: #44403c;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section.tabbed { border-top-left-radius: 0; }

    .help-text {
      font-size: 0.78rem;
      color: #78716c;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .hidden { display: none; }
    .dim-row { opacity: 0.4; }
    .table-wrap { overflow-x: auto; }

    .subtitle {
      text-align: center;
      color: #d6d3d1;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: -16px;
      margin-bottom: 22px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 800px) {
      .village-table { font-size: 0.72rem; }
      .village-table td, .village-table th { padding: 3px 3px; }
      .village-table select { font-size: 0.7rem; max-width: 90px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Trade Route Calculator</h1>
    <div class="subtitle">Designed for x3 Speed</div>

    <div class="section">
      <div class="section-title">Paste Production Overview</div>
      <div class="help-text">
        In Travian, go to your village overview and click the <strong>Resources</strong> tab then the <strong>Production</strong> tab.
        Select all (Ctrl+A) and paste it below.
        <br>
        Url should be */village/statistics/resources/production
      </div>
      <textarea id="paste-input" placeholder="Paste your Travian production overview here..."></textarea>
      <div class="btn-row">
        <button class="btn" onclick="parseInput()">Parse</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        <span class="parse-error" id="parse-error"></span>
      </div>
    </div>

    <div id="settings-section" class="section hidden">
      <div class="section-title">Settings</div>
      <div class="controls-row">
        <div class="dropdown-group">
          <label>Tribe</label>
          <select id="tribe" onchange="onTribeChange()"></select>
        </div>
        <div class="dropdown-group">
          <label>Trade Route Interval</label>
          <select id="interval" onchange="recalculate()">
            <option value="1">1 hour</option>
            <option value="2">2 hours</option>
            <option value="3">3 hours</option>
            <option value="4">4 hours</option>
            <option value="6">6 hours</option>
            <option value="8">8 hours</option>
            <option value="12">12 hours</option>
            <option value="24">24 hours</option>
          </select>
        </div>
        <div class="dropdown-group">
          <label>Recruitment</label>
          <select id="alliance-bonus" onchange="recalculate()">
            <option value="0">0%</option>
            <option value="0.02">2%</option>
            <option value="0.04">4%</option>
            <option value="0.06">6%</option>
            <option value="0.08">8%</option>
            <option value="0.10">10%</option>
          </select>
        </div>
      </div>
    </div>

    <div id="results-section" class="hidden">
      <div class="tab-row">
        <div class="tab-btn active" onclick="switchTab('overview')">Overview</div>
        <div class="tab-btn" onclick="switchTab('troops')">Troops</div>
      </div>

      <div id="tab-overview" class="section tabbed tab-content active">
        <div class="table-wrap">
          <table class="village-table" id="overview-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div id="tab-troops" class="section tabbed tab-content">
        <div class="table-wrap">
          <table class="village-table" id="troops-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="troops.js"></script>
  <script>
    const SERVER_SPEED = 3;
    const RESOURCES = ['lumber', 'clay', 'iron', 'crop'];

    const CELEB_COST = {
      small: { lumber: 6400, clay: 6650, iron: 5940, crop: 1340 },
      large: { lumber: 29700, clay: 33250, iron: 32000, crop: 6700 }
    };

    const CELEB_DURATION = {
      small: {
        1:43200, 2:41645, 3:40146, 4:38700, 5:37307, 6:35964, 7:34669,
        8:33421, 9:32218, 10:31058, 11:29940, 12:28862, 13:27823,
        14:26822, 15:25856, 16:24925, 17:24028, 18:23163, 19:22329, 20:21525
      },
      large: {
        10:77646, 11:74850, 12:72156, 13:69558, 14:67054, 15:64640,
        16:62313, 17:60070, 18:57907, 19:55823, 20:53813
      }
    };

    // Buildings config: id, label, troopSource (which TROOPS key), costMultiplier, helmetType
    const BUILDINGS = [
      { id: 'barracks',  label: 'Barracks', src: 'barracks', costMul: 1, helmet: 'infantry' },
      { id: 'gb',        label: 'GB',       src: 'barracks', costMul: 3, helmet: 'infantry' },
      { id: 'stable',    label: 'Stable',   src: 'stable',   costMul: 1, helmet: 'cavalry' },
      { id: 'gs',        label: 'GS',       src: 'stable',   costMul: 3, helmet: 'cavalry' },
      { id: 'workshop',  label: 'Workshop', src: 'workshop',  costMul: 1, helmet: null },
    ];

    let villages = [];
    let bulkState = {
      th: 0, celeb: 'none', artifact: 1,
      barracksLevel: 0, barracksTroop: '', gbLevel: 0, gbTroop: '',
      stableLevel: 0, stableTroop: '', gsLevel: 0, gsTroop: '',
      workshopLevel: 0, workshopTroop: '',
      infantryHelmet: 0, cavalryHelmet: 0, hdtLevel: 0,
    };

    // --- Utility ---

    function cleanNumber(str) {
      return str.replace(/[\u202d\u202c\u200e\u200f\u2212]/g, m => m === '\u2212' ? '-' : '').replace(/,/g, '');
    }

    function formatNum(val) {
      return Math.round(val).toLocaleString();
    }

    function valClass(val) {
      const r = Math.round(val);
      if (r > 0) return 'val-positive';
      if (r < 0) return 'val-negative';
      return 'val-zero';
    }

    function getSelectedTribe() {
      return document.getElementById('tribe').value;
    }

    function getAllianceBonus() {
      return parseFloat(document.getElementById('alliance-bonus').value) || 0;
    }

    function getInterval() {
      return parseInt(document.getElementById('interval').value);
    }

    // --- Default village troop config ---

    function defaultTroopConfig() {
      const cfg = { infantryHelmet: 0, cavalryHelmet: 0, artifact: 1, hdtLevel: 0 };
      BUILDINGS.forEach(b => {
        cfg[b.id + 'Level'] = 0;
        cfg[b.id + 'Troop'] = '';
      });
      return cfg;
    }

    // --- Training time calculation ---

    function calcTrainingCost(village, intervalHours) {
      const tribe = getSelectedTribe();
      const alliance = getAllianceBonus();
      const tribeData = TROOPS[tribe];
      if (!tribeData) return { lumber: 0, clay: 0, iron: 0, crop: 0 };

      const totalCost = { lumber: 0, clay: 0, iron: 0, crop: 0 };
      const intervalSec = intervalHours * 3600;
      const tc = village.troopConfig;

      BUILDINGS.forEach(bldg => {
        const level = tc[bldg.id + 'Level'];
        const troopName = tc[bldg.id + 'Troop'];
        if (!level || !troopName) return;

        const troops = tribeData[bldg.src];
        if (!troops) return;
        const troop = troops.find(t => t.name === troopName);
        if (!troop) return;

        const helmetBonus = bldg.helmet === 'infantry' ? tc.infantryHelmet
                          : bldg.helmet === 'cavalry' ? tc.cavalryHelmet
                          : 0;

        const needsMod = bldg.src !== 'workshop' && (tribe === 'romans' || tribe === 'teutons' || tribe === 'gauls');
        const tribeMod = needsMod ? 0.8 : 1.0;

        // HDT is a direct time reduction (not a speed divisor), stable/GS only
        const hdtReduction = (bldg.src === 'stable' && tc.hdtLevel > 0) ? (1 - tc.hdtLevel / 100) : 1;

        const unitTime = (troop.time / SERVER_SPEED)
                       * tribeMod * Math.pow(0.9, level - 1)
                       / (1 + helmetBonus)
                       / (1 + alliance)
                       * hdtReduction
                       * tc.artifact;

        const trained = Math.floor(intervalSec / unitTime);
        if (trained <= 0) return;

        totalCost.lumber += trained * troop.cost[0] * bldg.costMul;
        totalCost.clay   += trained * troop.cost[1] * bldg.costMul;
        totalCost.iron   += trained * troop.cost[2] * bldg.costMul;
        totalCost.crop   += trained * troop.cost[3] * bldg.costMul;
      });

      return totalCost;
    }

    // --- Celebration cost ---

    function celebCostPerHour(type, thLevel) {
      if (type === 'none') return { lumber: 0, clay: 0, iron: 0, crop: 0 };
      const dur = CELEB_DURATION[type][thLevel];
      if (!dur) return { lumber: 0, clay: 0, iron: 0, crop: 0 };
      const hours = dur / 3600;
      const cost = {};
      RESOURCES.forEach(r => { cost[r] = CELEB_COST[type][r] / hours; });
      return cost;
    }

    // --- Dropdown helpers ---

    function levelOptions(selected, includeZero) {
      let html = includeZero ? `<option value="0" ${selected === 0 ? 'selected' : ''}>-</option>` : '';
      for (let i = 1; i <= 20; i++) {
        html += `<option value="${i}" ${i === selected ? 'selected' : ''}>${i}</option>`;
      }
      return html;
    }

    function troopOptions(buildingSrc, selectedName) {
      const tribe = getSelectedTribe();
      const troops = TROOPS[tribe] && TROOPS[tribe][buildingSrc];
      let html = `<option value="">-</option>`;
      if (troops) {
        troops.forEach(t => {
          html += `<option value="${t.name}" ${t.name === selectedName ? 'selected' : ''}>${t.name}</option>`;
        });
      }
      return html;
    }

    function helmetOptions(selected) {
      return `<option value="0" ${selected === 0 ? 'selected' : ''}>None</option>
              <option value="0.10" ${selected === 0.10 ? 'selected' : ''}>10%</option>
              <option value="0.15" ${selected === 0.15 ? 'selected' : ''}>15%</option>
              <option value="0.20" ${selected === 0.20 ? 'selected' : ''}>20%</option>`;
    }

    function artifactOptions(selected) {
      return `<option value="1" ${selected === 1 ? 'selected' : ''}>None</option>
              <option value="0.75" ${selected === 0.75 ? 'selected' : ''}>75%</option>
              <option value="0.5" ${selected === 0.5 ? 'selected' : ''}>50%</option>`;
    }

    function celebSelectOptions(selected, thLevel) {
      let html = `<option value="none" ${selected === 'none' ? 'selected' : ''}>None</option>`;
      html += `<option value="small" ${selected === 'small' ? 'selected' : ''}>Small</option>`;
      html += `<option value="large" ${selected === 'large' ? 'selected' : ''} ${thLevel < 10 ? 'disabled' : ''}>Large</option>`;
      return html;
    }

    // --- Parse ---

    function parseInput() {
      const raw = document.getElementById('paste-input').value;
      const errorEl = document.getElementById('parse-error');
      errorEl.textContent = '';

      if (!raw.trim()) {
        errorEl.textContent = 'Paste your production overview first.';
        return;
      }

      const cleaned = raw.replace(/[\u202d\u202c\u200e\u200f]/g, '');
      const lines = cleaned.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const parsed = [];

      for (const line of lines) {
        if (/^(Village|Sum:|Resources|Warehouse|Production|Capacity|Privacy|Server time|Alliance|Link list|Population|Loyalty|Villages\b|Village groups|House|Hero|\d+$)/i.test(line)) continue;
        if (/^(Overview|Culture points|Troops|Send FL|Top 10|Send Troop|Kiri Sim|Party|Flow|Next Villa|Homepage|Discord|News|Support|Game rules|Terms|Imprint|Switch to|BALKAN|Task overview)/i.test(line)) continue;
        if (/^\u00a9|^©/.test(line)) continue;

        const allMatches = [...line.matchAll(/-?[\d,]+/g)];
        if (allMatches.length < 4) continue;

        const lastFour = allMatches.slice(-4);
        const firstNumStart = lastFour[0].index;
        const villageName = line.substring(0, firstNumStart).trim();
        if (!villageName) continue;

        if (/^\(.*\|.*\)$/.test(villageName)) continue;
        if (/^\(/.test(villageName) && /\)$/.test(line)) continue;

        const nums = lastFour.map(m => parseInt(cleanNumber(m[0]), 10));
        if (nums.some(isNaN)) continue;
        if (villageName.toLowerCase().startsWith('sum')) continue;

        parsed.push({
          name: villageName,
          production: { lumber: nums[0], clay: nums[1], iron: nums[2], crop: nums[3] },
          thLevel: 20,
          celebType: 'none',
          enabled: true,
          troopConfig: defaultTroopConfig(),
        });
      }

      if (parsed.length === 0) {
        errorEl.textContent = 'Could not parse any villages. Make sure you pasted the Production tab.';
        return;
      }

      villages = parsed;
      document.getElementById('settings-section').classList.remove('hidden');
      document.getElementById('results-section').classList.remove('hidden');
      renderOverviewTable(getInterval());
      renderTroopsTable();
      recalculate();
    }

    function clearAll() {
      villages = [];
      document.getElementById('paste-input').value = '';
      document.getElementById('parse-error').textContent = '';
      document.getElementById('settings-section').classList.add('hidden');
      document.getElementById('results-section').classList.add('hidden');
    }

    // --- Tab switching ---

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
    }

    // --- Render Overview Table (Production + Expenses + Trade Routes) ---

    function renderOverviewTable(interval) {
      const table = document.getElementById('overview-table');
      table.querySelector('thead').innerHTML = `
        <tr>
          <th></th>
          <th></th>
          <th class="group-divider"></th>
          <th></th>
          <th colspan="5" class="group-header group-divider">Production</th>
          <th colspan="5" class="group-header group-divider">Expenses</th>
          <th colspan="5" class="group-header group-divider">Trade Route</th>
        </tr>
        <tr>
          <th></th>
          <th>Village</th>
          <th class="group-divider">Town Hall</th>
          <th>Party</th>
          <th class="label-lumber group-divider">Lumber</th>
          <th class="label-clay">Clay</th>
          <th class="label-iron">Iron</th>
          <th class="label-crop">Crop</th>
          <th class="group-divider">Total</th>
          <th class="label-lumber group-divider">Lumber</th>
          <th class="label-clay">Clay</th>
          <th class="label-iron">Iron</th>
          <th class="label-crop">Crop</th>
          <th class="group-divider">Total</th>
          <th class="label-lumber group-divider">Lumber</th>
          <th class="label-clay">Clay</th>
          <th class="label-iron">Iron</th>
          <th class="label-crop">Crop</th>
          <th class="group-divider">Total</th>
        </tr>
        <tr class="set-all-row">
          <th></th><th>set all</th>
          <th class="group-divider"><select onchange="bulkSetTH(+this.value)">${levelOptions(bulkState.th, true)}</select></th>
          <th><select onchange="bulkSetCeleb(this.value)">${celebSelectOptions(bulkState.celeb, 20)}</select></th>
          <th class="group-divider"></th><th></th><th></th><th></th><th class="group-divider"></th>
          <th class="group-divider"></th><th></th><th></th><th></th><th class="group-divider"></th>
          <th class="group-divider"></th><th></th><th></th><th></th><th class="group-divider"></th>
        </tr>`;

      let bodyHtml = '';
      const prodSums = { lumber: 0, clay: 0, iron: 0, crop: 0 };
      const expSums = { lumber: 0, clay: 0, iron: 0, crop: 0 };
      const sendSums = { lumber: 0, clay: 0, iron: 0, crop: 0 };

      villages.forEach((v, i) => {
        const prod = v.production;
        const expense = { lumber: 0, clay: 0, iron: 0, crop: 0 };
        const send = { lumber: 0, clay: 0, iron: 0, crop: 0 };

        if (v.enabled) {
          const celebCost = celebCostPerHour(v.celebType, v.thLevel);
          const trainCost = calcTrainingCost(v, interval);
          RESOURCES.forEach(r => {
            expense[r] = celebCost[r] * interval + trainCost[r];
            send[r] = prod[r] * interval - expense[r];
          });
        }

        RESOURCES.forEach(r => { prodSums[r] += prod[r]; expSums[r] += expense[r]; sendSums[r] += send[r]; });
        const prodTotal = prod.lumber + prod.clay + prod.iron + prod.crop;
        const expTotal = expense.lumber + expense.clay + expense.iron + expense.crop;
        const sendTotal = send.lumber + send.clay + send.iron + send.crop;

        bodyHtml += `<tr class="${v.enabled ? '' : 'dim-row'}">
          <td><input type="checkbox" ${v.enabled ? 'checked' : ''} onchange="toggleVillage(${i}, this.checked)"></td>
          <td class="village-name" title="${v.name}">${v.name}</td>
          <td class="group-divider"><select onchange="setTH(${i}, this.value)">${levelOptions(v.thLevel)}</select></td>
          <td><select onchange="setCeleb(${i}, this.value)">${celebSelectOptions(v.celebType, v.thLevel)}</select></td>
          <td class="group-divider">${formatNum(prod.lumber)}</td>
          <td>${formatNum(prod.clay)}</td>
          <td>${formatNum(prod.iron)}</td>
          <td>${formatNum(prod.crop)}</td>
          <td class="group-divider">${formatNum(prodTotal)}</td>
          <td class="val-negative group-divider">${formatNum(expense.lumber)}</td>
          <td class="val-negative">${formatNum(expense.clay)}</td>
          <td class="val-negative">${formatNum(expense.iron)}</td>
          <td class="val-negative">${formatNum(expense.crop)}</td>
          <td class="val-negative group-divider">${formatNum(expTotal)}</td>
          <td class="${valClass(send.lumber)} group-divider">${formatNum(send.lumber)}</td>
          <td class="${valClass(send.clay)}">${formatNum(send.clay)}</td>
          <td class="${valClass(send.iron)}">${formatNum(send.iron)}</td>
          <td class="${valClass(send.crop)}">${formatNum(send.crop)}</td>
          <td class="${valClass(sendTotal)} group-divider">${formatNum(sendTotal)}</td>
        </tr>`;
      });

      const prodGrand = prodSums.lumber + prodSums.clay + prodSums.iron + prodSums.crop;
      const expGrand = expSums.lumber + expSums.clay + expSums.iron + expSums.crop;
      const sendGrand = sendSums.lumber + sendSums.clay + sendSums.iron + sendSums.crop;
      bodyHtml += `<tr class="sum-row">
        <td></td>
        <td>Total</td>
        <td class="group-divider"></td><td></td>
        <td class="group-divider">${formatNum(prodSums.lumber)}</td>
        <td>${formatNum(prodSums.clay)}</td>
        <td>${formatNum(prodSums.iron)}</td>
        <td>${formatNum(prodSums.crop)}</td>
        <td class="group-divider">${formatNum(prodGrand)}</td>
        <td class="val-negative group-divider">${formatNum(expSums.lumber)}</td>
        <td class="val-negative">${formatNum(expSums.clay)}</td>
        <td class="val-negative">${formatNum(expSums.iron)}</td>
        <td class="val-negative">${formatNum(expSums.crop)}</td>
        <td class="val-negative group-divider">${formatNum(expGrand)}</td>
        <td class="${valClass(sendSums.lumber)} group-divider">${formatNum(sendSums.lumber)}</td>
        <td class="${valClass(sendSums.clay)}">${formatNum(sendSums.clay)}</td>
        <td class="${valClass(sendSums.iron)}">${formatNum(sendSums.iron)}</td>
        <td class="${valClass(sendSums.crop)}">${formatNum(sendSums.crop)}</td>
        <td class="${valClass(sendGrand)} group-divider">${formatNum(sendGrand)}</td>
      </tr>`;

      table.querySelector('tbody').innerHTML = bodyHtml;
    }

    // --- Render Troops Table ---

    function hdtOptions(selected) {
      let html = `<option value="0" ${selected === 0 ? 'selected' : ''}>-</option>`;
      for (let i = 1; i <= 20; i++) {
        html += `<option value="${i}" ${i === selected ? 'selected' : ''}>${i} (${i}%)</option>`;
      }
      return html;
    }

    function renderTroopsTable() {
      const table = document.getElementById('troops-table');
      const isRoman = getSelectedTribe() === 'romans';

      // Group headers row + column headers row
      let groupHeader = '<tr>';
      groupHeader += '<th></th>'; // village
      BUILDINGS.forEach(b => {
        groupHeader += `<th colspan="2" class="group-header group-divider">${b.label}</th>`;
      });
      groupHeader += '<th colspan="2" class="group-header group-divider">Helmets</th>';
      if (isRoman) groupHeader += '<th class="group-header group-divider">HDT</th>';
      groupHeader += '<th class="group-header group-divider">Artifact</th>';
      groupHeader += '</tr>';

      let colHeader = '<tr>';
      colHeader += '<th>Village</th>';
      BUILDINGS.forEach(b => {
        colHeader += `<th class="group-divider">Lvl</th><th>Troop</th>`;
      });
      colHeader += '<th class="group-divider">Infantry</th><th>Cavalry</th>';
      if (isRoman) colHeader += '<th class="group-divider">Lvl</th>';
      colHeader += '<th class="group-divider">Trainer</th>';
      colHeader += '</tr>';

      // Set All row
      let setAllRow = '<tr class="set-all-row">';
      setAllRow += '<th>set all</th>';
      BUILDINGS.forEach(b => {
        setAllRow += `<th class="group-divider"><select onchange="bulkSetTroopCfg('${b.id}Level',+this.value)">${levelOptions(bulkState[b.id + 'Level'], true)}</select></th>`;
        setAllRow += `<th><select onchange="bulkSetTroopCfg('${b.id}Troop',this.value)">${troopOptions(b.src, bulkState[b.id + 'Troop'])}</select></th>`;
      });
      setAllRow += `<th class="group-divider"><select onchange="bulkSetTroopCfg('infantryHelmet',+this.value)">${helmetOptions(bulkState.infantryHelmet)}</select></th>`;
      setAllRow += `<th><select onchange="bulkSetTroopCfg('cavalryHelmet',+this.value)">${helmetOptions(bulkState.cavalryHelmet)}</select></th>`;
      if (isRoman) setAllRow += `<th class="group-divider"><select onchange="bulkSetTroopCfg('hdtLevel',+this.value)">${hdtOptions(bulkState.hdtLevel)}</select></th>`;
      setAllRow += `<th class="group-divider"><select onchange="bulkSetArtifact(+this.value)">${artifactOptions(bulkState.artifact)}</select></th>`;
      setAllRow += '</tr>';

      table.querySelector('thead').innerHTML = groupHeader + colHeader + setAllRow;

      let bodyHtml = '';
      villages.forEach((v, i) => {
        const tc = v.troopConfig;
        bodyHtml += `<tr class="${v.enabled ? '' : 'dim-row'}">`;
        bodyHtml += `<td class="village-name" title="${v.name}">${v.name}</td>`;

        BUILDINGS.forEach(b => {
          bodyHtml += `<td class="group-divider"><select onchange="setTroopCfg(${i},'${b.id}Level',+this.value)">${levelOptions(tc[b.id + 'Level'], true)}</select></td>`;
          bodyHtml += `<td><select onchange="setTroopCfg(${i},'${b.id}Troop',this.value)">${troopOptions(b.src, tc[b.id + 'Troop'])}</select></td>`;
        });

        bodyHtml += `<td class="group-divider"><select onchange="setTroopCfg(${i},'infantryHelmet',+this.value)">${helmetOptions(tc.infantryHelmet)}</select></td>`;
        bodyHtml += `<td><select onchange="setTroopCfg(${i},'cavalryHelmet',+this.value)">${helmetOptions(tc.cavalryHelmet)}</select></td>`;
        if (isRoman) bodyHtml += `<td class="group-divider"><select onchange="setTroopCfg(${i},'hdtLevel',+this.value)">${hdtOptions(tc.hdtLevel)}</select></td>`;
        bodyHtml += `<td class="group-divider"><select onchange="setTroopCfg(${i},'artifact',+this.value)">${artifactOptions(tc.artifact)}</select></td>`;

        bodyHtml += '</tr>';
      });

      table.querySelector('tbody').innerHTML = bodyHtml;
    }


    // --- Event handlers ---

    function enforceCelebLimit(v) {
      if (v.celebType === 'large' && v.thLevel < 10) v.celebType = 'small';
    }

    function setTH(i, val) {
      villages[i].thLevel = parseInt(val);
      enforceCelebLimit(villages[i]);
      renderOverviewTable(getInterval());
      recalculate();
    }

    function setCeleb(i, val) {
      villages[i].celebType = val;
      recalculate();
    }

    function toggleVillage(i, checked) {
      villages[i].enabled = checked;
      renderOverviewTable(getInterval());
      renderTroopsTable();
      recalculate();
    }

    function setTroopCfg(i, key, val) {
      villages[i].troopConfig[key] = val;
      recalculate();
    }

    function onTribeChange() {
      // Reset troop selections when tribe changes (levels preserved)
      villages.forEach(v => {
        BUILDINGS.forEach(b => { v.troopConfig[b.id + 'Troop'] = ''; });
      });
      renderTroopsTable();
      recalculate();
    }

    function bulkSetCeleb(val) {
      bulkState.celeb = val;
      villages.forEach(v => {
        v.celebType = val;
        enforceCelebLimit(v);
      });
      renderOverviewTable(getInterval());
      recalculate();
    }

    function bulkSetTH(val) {
      bulkState.th = val;
      if (!val) return;
      villages.forEach(v => {
        v.thLevel = val;
        enforceCelebLimit(v);
      });
      renderOverviewTable(getInterval());
      recalculate();
    }

    function bulkSetTroopCfg(key, val) {
      bulkState[key] = val;
      villages.forEach(v => { v.troopConfig[key] = val; });
      renderTroopsTable();
      recalculate();
    }

    function bulkSetArtifact(val) {
      bulkState.artifact = val;
      villages.forEach(v => { v.troopConfig.artifact = val; });
      renderTroopsTable();
      recalculate();
    }

    function recalculate() {
      if (villages.length === 0) return;
      renderOverviewTable(getInterval());
    }

    // --- Init ---

    (function init() {
      const tribeSel = document.getElementById('tribe');
      TRIBE_LIST.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name;
        tribeSel.appendChild(opt);
      });
    })();
  </script>
</body>
</html>
